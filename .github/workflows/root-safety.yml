          INSERT INTO runtime_access_requests (
            request_id, instance_id, attempt_id, route_policy_revision, method,
            idempotency_key, status, result_code, requested_at, completed_at
          ) VALUES (
            'ci-supervisor-request', 'ci-instance', 'ci-attempt', 'ci-route-policy', 'GET',
            'ci-supervisor-request-idempotency', 'pending', NULL, now(), NULL
          );
          INSERT INTO runtime_audit_events (
            audit_event_id, actor_type, request_id, idempotency_key, owner_kind,
            owner_id, owner_revision, instance_id, runtime_spec_revision_id,
            adapter_template_revision_id, action, previous_state, next_state,
            result_code, occurred_at, provenance
          ) SELECT
            'ci-supervisor-audit', 'platform_supervisor', 'ci-supervisor-request', 'ci-supervisor-idempotency',
            'paper_probe', 'ci-owner', 'ci-owner-revision', 'ci-instance',
            fixture_attempt.runtime_spec_revision_id,
            fixture_attempt.adapter_template_revision_id, 'start', NULL,
            '{"lifecycle_status":"registered"}'::json, 'accepted', now(), '{}'::json
          FROM runtime_attempts AS fixture_attempt
          WHERE fixture_attempt.attempt_id = 'ci-attempt';
          ROLLBACK;
          SQL

          expect_role_denied() {
            role_name="$1"
            probe_name="$2"
            statement="$3"
            set +e
            docker exec platform-postgres-ci \
              psql --username "${role_name}" --dbname platform --set ON_ERROR_STOP=on \
              --command "BEGIN; ${statement}; ROLLBACK;" \
              >"${platform_ci_dir}/denied-${role_name}-${probe_name}.log" 2>&1
            denied_status=$?
            set -e
            test "${denied_status}" -ne 0
            grep --extended-regexp --quiet "permission denied|must be owner of" \
              "${platform_ci_dir}/denied-${role_name}-${probe_name}.log"
          }
          expect_role_denied platform_control temp "CREATE TEMP TABLE phase2a_control_temp_probe(id integer)"
          expect_role_denied platform_control create "CREATE TABLE public.phase2a_control_ddl_probe(id integer)"
          expect_role_denied platform_control alter "ALTER TABLE public.runtime_instances ADD COLUMN phase2a_control_probe integer"
          expect_role_denied platform_control drop "DROP TABLE public.runtime_instances"
          expect_role_denied platform_control delete "DELETE FROM runtime_instances WHERE instance_id = 'ci-instance'"
          expect_role_denied platform_control truncate "TRUNCATE TABLE runtime_instances"
          expect_role_denied platform_control update "UPDATE runtime_instances SET desired_state = 'running' WHERE instance_id = 'ci-instance'"
          expect_role_denied platform_supervisor temp "CREATE TEMP TABLE phase2a_supervisor_temp_probe(id integer)"
          expect_role_denied platform_supervisor create "CREATE TABLE public.phase2a_supervisor_ddl_probe(id integer)"
          expect_role_denied platform_supervisor alter "ALTER TABLE public.platform_catalog_revisions ADD COLUMN phase2a_supervisor_probe integer"
          expect_role_denied platform_supervisor drop "DROP TABLE public.platform_catalog_revisions"
          expect_role_denied platform_supervisor delete "DELETE FROM runtime_instances WHERE instance_id = 'ci-instance'"
          expect_role_denied platform_supervisor truncate "TRUNCATE TABLE runtime_instances"
          expect_role_denied platform_supervisor update "UPDATE platform_catalog_revisions SET payload = payload"
          expect_role_denied platform_control database-create "CREATE SCHEMA phase2a_control_database_probe"
          expect_role_denied platform_control delegated-table "DELETE FROM public.platform_ci_acl_table"
          expect_role_denied platform_supervisor delegated-sequence "SELECT setval('public.platform_ci_acl_sequence', 1)"
          expect_role_denied platform_control private-schema "SELECT * FROM platform_ci_private.probe"
          expect_role_denied platform_supervisor private-table "SELECT * FROM platform_ci_private.probe"

          docker create \
            --name platform-control-ci \
            --network freqtrade-platform-ingress-ci \
            --user 1000:1000 \
            --read-only \
            --init \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --publish 127.0.0.1:8090:8090 \
            --env PLATFORM_CONTROL_BIND_MODE=container_loopback_publish \
            --env PLATFORM_CONTROL_LISTEN_HOST=0.0.0.0 \
            --env PLATFORM_CONTROL_USERNAME=platform_operator \
            --env PLATFORM_CONTROL_API_PASSWORD_FILE=/run/secrets/api_password \
            --env PLATFORM_CONTROL_JWT_SECRET_FILE=/run/secrets/jwt_secret_key \
            --env PLATFORM_DATABASE_HOST=platform-postgres-ci \
            --env PLATFORM_DATABASE_PORT=5432 \
            --env PLATFORM_DATABASE_NAME=platform \
            --env PLATFORM_DATABASE_USERNAME=platform_control \
            --env PLATFORM_DATABASE_PASSWORD_FILE=/run/secrets/database_password \
            --mount type=bind,src="${platform_ci_dir}/api_password",dst=/run/secrets/api_password,readonly \
            --mount type=bind,src="${platform_ci_dir}/jwt_secret_key",dst=/run/secrets/jwt_secret_key,readonly \
            --mount type=bind,src="${platform_ci_dir}/platform_control_db_password",dst=/run/secrets/database_password,readonly \
            --entrypoint python \
            "${REVIEWED_IMAGE_ID}" \
            -m freqtrade.platform_control

          docker network connect freqtrade-platform-ci platform-control-ci
          control_networks="$(docker inspect --format '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' platform-control-ci | sort | sed '/^$/d')"
          test "${control_networks}" = $'freqtrade-platform-ci\nfreqtrade-platform-ingress-ci'
          control_port_mapping="$(docker inspect --format '{{if eq (len .HostConfig.PortBindings) 1}}{{with (index .HostConfig.PortBindings "8090/tcp")}}{{if eq (len .) 1}}{{(index . 0).HostIp}}|{{(index . 0).HostPort}}{{end}}{{end}}{{end}}' platform-control-ci)"
          test "${control_port_mapping}" = "127.0.0.1|8090"
          docker start platform-control-ci
          runtime_control_port_mapping="$(docker port platform-control-ci 8090/tcp)"
          test "${runtime_control_port_mapping}" = "127.0.0.1:8090"

          ready=0
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error "http://127.0.0.1:8090/api/v2/ping" \
              --output "${platform_ci_dir}/ping.json"; then
              ready=1
              break
            fi
            sleep 1
          done
          test "${ready}" -eq 1

          python - "${platform_ci_dir}" <<'PY'
          import os
          import secrets
          import sys
          from pathlib import Path

          root = Path(sys.argv[1])
          sentinel = secrets.token_urlsafe(32)
          sentinel_file = root / "query-sentinel"
          response_file = root / "query-rejection.json"
          config_file = root / "query-rejection.curl"
          sentinel_file.write_text(sentinel, encoding="utf-8")
          config_file.write_text(
              'url = "http://127.0.0.1:8090/api/v2/ping?private_key='
              + sentinel
              + '"\n'
              + f'output = "{response_file}"\n'
              + 'write-out = "%{http_code}"\n'
              + "silent\nshow-error\n",
              encoding="utf-8",
          )
          os.chmod(sentinel_file, 0o600)
          os.chmod(config_file, 0o600)
          PY
          query_status="$(curl --config "${platform_ci_dir}/query-rejection.curl")"
          test "${query_status}" = "400"
          python - "${platform_ci_dir}/query-rejection.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          response = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if response != {"detail": "unexpected_query_parameters"}:
              raise SystemExit("query rejection response differs")
          PY
          docker logs platform-control-ci > "${platform_ci_dir}/query-container.log" 2>&1
          if grep --quiet --fixed-strings --file "${platform_ci_dir}/query-sentinel" \
            "${platform_ci_dir}/query-container.log"; then
            exit 1
          fi

          python - "${platform_ci_dir}/api_password" "${platform_ci_dir}/login.netrc" <<'PY'
          import os
          import sys
          from pathlib import Path

          password = Path(sys.argv[1]).read_text(encoding="utf-8").rstrip("\r\n")
          netrc = Path(sys.argv[2])
          netrc.write_text(
              f"machine 127.0.0.1 login platform_operator password {password}\n",
              encoding="utf-8",
          )
          os.chmod(netrc, 0o600)
          PY
          curl --fail --silent --show-error \
            --netrc-file "${platform_ci_dir}/login.netrc" \
            --request POST "http://127.0.0.1:8090/api/v2/token/login" \
            --output "${platform_ci_dir}/tokens.json"
          python - "${platform_ci_dir}/tokens.json" "${platform_ci_dir}/authenticated.curl" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          token = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))["access_token"]
          config = Path(sys.argv[2])
          config.write_text(
              f'header = "Authorization: Bearer {token}"\n',
              encoding="utf-8",
          )
          os.chmod(config, 0o600)
          PY

          curl --config "${platform_ci_dir}/authenticated.curl" --fail --silent --show-error \
            "http://127.0.0.1:8090/api/v2/catalog" \
            --output "${platform_ci_dir}/catalog.json"
          curl --config "${platform_ci_dir}/authenticated.curl" --fail --silent --show-error \
            "http://127.0.0.1:8090/api/v2/runtime-instances" \
            --output "${platform_ci_dir}/instances.json"

          expect_404() {
            path="$1"
            status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
              "http://127.0.0.1:8090${path}")"
            test "${status}" = "404"
          }
          expect_404 "/openapi.json"
          expect_404 "/docs"
          expect_404 "/redoc"
          expect_404 "/api/v2/runtime-instances/ci-instance/start"
          expect_404 "/api/v2/runtime-access/ci-instance"

      - name: Clean platform control plane
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          platform_ci_dir="${RUNNER_TEMP}/platform-control-ci"
          operator_root="${RUNNER_TEMP}/platform-operator"
          reviewed_operator_image_id="${{ steps.reviewed-operator-image.outputs.image_id }}"
          cleanup_status=0
          network_query_error="${RUNNER_TEMP}/platform-network-query.err"
          image_query_error="${RUNNER_TEMP}/platform-operator-image-query.err"

          verify_network_absent() {
            network_name="$1"
            if docker network inspect "${network_name}" \
              >/dev/null 2>"${network_query_error}"; then
              cleanup_status=1
            elif ! grep --extended-regexp --quiet \
              "No such network|network .* not found" "${network_query_error}"; then
              cleanup_status=1
            fi
          }
          capture_operator_image_mapping() {
            mapping_path="$1"
            raw_path="${mapping_path}.raw"
            matching_path="${mapping_path}.matching"
            tags_path="${mapping_path}.tags"
            if ! docker image ls --format '{{.Repository}}:{{.Tag}}' \
              > "${raw_path}"; then
              return 1
            fi
            grep_status=0
            grep --extended-regexp '^freqtrade-cn-operator:' \
              "${raw_path}" > "${matching_path}" || grep_status=$?
            if test "${grep_status}" -eq 1; then
              : > "${matching_path}"
            elif test "${grep_status}" -ne 0; then
              return 1
            fi
            if ! sort --unique "${matching_path}" > "${tags_path}"; then
              return 1
            fi
            : > "${mapping_path}"
            while IFS= read -r operator_tag; do
              test -n "${operator_tag}" || continue
              if ! operator_id="$(docker image inspect \
                --format '{{.Id}}' "${operator_tag}")"; then
                return 1
              fi
              test -n "${operator_id}" || return 1
              if ! printf '%s|%s\n' "${operator_tag}" "${operator_id}" \
                >> "${mapping_path}"; then
                return 1
              fi
            done < "${tags_path}"
          }
          verify_operator_image_absent() {
            operator_id="$1"
            if docker image inspect "${operator_id}" \
              >/dev/null 2>"${image_query_error}"; then
              cleanup_status=1
            elif ! grep --extended-regexp --quiet \
              "No such image|No such object" "${image_query_error}"; then
              cleanup_status=1
            fi
          }
          remove_operator_image_id() {
            operator_id="$1"
            if ! docker image rm --force "${operator_id}" \
              >/dev/null 2>"${image_query_error}" \
              && ! grep --extended-regexp --quiet \
                "No such image|No such object" "${image_query_error}"; then
              cleanup_status=1
            fi
            verify_operator_image_absent "${operator_id}"
          }

          operator_containers=""
          operator_container_inventory_trusted=1
          if ! operator_containers="$(docker ps --all --quiet \
            --filter label=com.docker.compose.service=platform-operator)"; then
            cleanup_status=1
            operator_container_inventory_trusted=0
          fi
          if test "${operator_container_inventory_trusted}" -eq 1 \
            && test -n "${operator_containers}"; then
            docker rm -f ${operator_containers} >/dev/null 2>&1 || cleanup_status=1
          fi
          docker network disconnect freqtrade-cn_platform-db platform-postgres-ci >/dev/null 2>&1 || true
          docker rm -f platform-control-ci platform-postgres-ci >/dev/null 2>&1 || true
          docker network rm freqtrade-cn_platform-db >/dev/null 2>&1 || true
          docker network rm freqtrade-platform-ci >/dev/null 2>&1 || true
          docker network rm freqtrade-platform-ingress-ci >/dev/null 2>&1 || true
          if ! operator_containers="$(docker ps --all --quiet \
            --filter label=com.docker.compose.service=platform-operator)"; then
            cleanup_status=1
          elif test -n "${operator_containers}"; then
            cleanup_status=1
          fi
          platform_containers=""
          if ! platform_containers="$(docker ps --all --quiet \
            --filter name='^/platform-control-ci$' \
            --filter name='^/platform-postgres-ci$')"; then
            cleanup_status=1
          elif test -n "${platform_containers}"; then
            cleanup_status=1
          fi
          verify_network_absent freqtrade-cn_platform-db
          verify_network_absent freqtrade-platform-ci
          verify_network_absent freqtrade-platform-ingress-ci
          if test -d "${platform_ci_dir}"; then
            if test -f "${platform_ci_dir}/volumes.before"; then
              docker volume ls --quiet | sort > "${platform_ci_dir}/volumes.detected"
              comm -13 "${platform_ci_dir}/volumes.before" \
                "${platform_ci_dir}/volumes.detected" > "${platform_ci_dir}/volumes.created"
              test ! -s "${platform_ci_dir}/volumes.created" || cleanup_status=1
              while IFS= read -r volume_name; do
                test -n "${volume_name}" || continue
                if ! docker volume rm "${volume_name}" >/dev/null; then
                  cleanup_status=1
                fi
              done < "${platform_ci_dir}/volumes.created"
              docker volume ls --quiet | sort > "${platform_ci_dir}/volumes.after"
              cmp "${platform_ci_dir}/volumes.before" "${platform_ci_dir}/volumes.after" || cleanup_status=1
            fi
            rm -rf "${platform_ci_dir}"
            test ! -e "${platform_ci_dir}" || cleanup_status=1
          fi
          if test -e "${operator_root}"; then
            sudo rm -rf "${operator_root}"
          fi
          test ! -e "${operator_root}" || cleanup_status=1
          operator_image_baseline="${RUNNER_TEMP}/platform-operator-images.before"
          operator_image_ids_baseline="${RUNNER_TEMP}/platform-operator-image-ids.before"
          operator_image_baseline_ready="${RUNNER_TEMP}/platform-operator-images.ready"
          operator_image_current="${RUNNER_TEMP}/platform-operator-images.current"
          operator_image_created="${RUNNER_TEMP}/platform-operator-images.created"
          operator_image_created_ids="${RUNNER_TEMP}/platform-operator-image-ids.created"
          if test -f "${operator_image_baseline}" \
            && test -f "${operator_image_ids_baseline}" \
            && test -f "${operator_image_baseline_ready}"; then
            operator_image_inventory_trusted=1
            if ! capture_operator_image_mapping "${operator_image_current}"; then
              cleanup_status=1
              operator_image_inventory_trusted=0
            fi
            if test "${operator_image_inventory_trusted}" -eq 1 \
              && ! cut --delimiter='|' --fields=1 "${operator_image_baseline}" \
                > "${operator_image_baseline}.tags"; then
              cleanup_status=1
              operator_image_inventory_trusted=0
            fi
            if test "${operator_image_inventory_trusted}" -eq 1 \
              && ! comm -13 "${operator_image_baseline}.tags" \
                "${operator_image_current}.tags" > "${operator_image_created}"; then
              cleanup_status=1
              operator_image_inventory_trusted=0
            fi
            if test "${operator_image_inventory_trusted}" -eq 1; then
              : > "${operator_image_created_ids}"
              while IFS='|' read -r operator_tag operator_id; do
                test -n "${operator_tag}" || continue
                baseline_id_status=0
                grep --fixed-strings --line-regexp \
                  "${operator_id}" "${operator_image_ids_baseline}" \
                  >/dev/null || baseline_id_status=$?
                if test "${baseline_id_status}" -eq 1; then
                  printf '%s\n' "${operator_id}" >> "${operator_image_created_ids}"
                elif test "${baseline_id_status}" -ne 0; then
                  cleanup_status=1
                  operator_image_inventory_trusted=0
                  break
                fi
              done < "${operator_image_current}"
            fi
            if test "${operator_image_inventory_trusted}" -eq 1 \
              && ! sort --unique --output="${operator_image_created_ids}" \
                "${operator_image_created_ids}"; then
              cleanup_status=1
              operator_image_inventory_trusted=0
            fi
            reviewed_operator_image_is_created=0
            if test "${operator_image_inventory_trusted}" -eq 1 \
              && test -n "${reviewed_operator_image_id}"; then
              reviewed_id_membership_status=0
              grep --fixed-strings --line-regexp \
                "${reviewed_operator_image_id}" "${operator_image_ids_baseline}" \
                >/dev/null || reviewed_id_membership_status=$?
              if test "${reviewed_id_membership_status}" -eq 1; then
                reviewed_operator_image_is_created=1
              elif test "${reviewed_id_membership_status}" -ne 0; then
                cleanup_status=1
                operator_image_inventory_trusted=0
              fi
            fi
            if test "${operator_image_inventory_trusted}" -eq 1; then
              while IFS= read -r operator_tag; do
                test -n "${operator_tag}" || continue
                docker image rm "${operator_tag}" >/dev/null 2>&1 \
                  || cleanup_status=1
              done < "${operator_image_created}"
              while IFS='|' read -r operator_tag operator_id; do
                test -n "${operator_tag}" || continue
                docker tag "${operator_id}" "${operator_tag}" >/dev/null 2>&1 \
                  || cleanup_status=1
              done < "${operator_image_baseline}"
              while IFS= read -r operator_id; do
                test -n "${operator_id}" || continue
                remove_operator_image_id "${operator_id}"
              done < "${operator_image_created_ids}"
              if test "${reviewed_operator_image_is_created}" -eq 1; then
                remove_operator_image_id "${reviewed_operator_image_id}"
              fi
              if ! capture_operator_image_mapping "${operator_image_current}"; then
                cleanup_status=1
              elif ! cmp "${operator_image_baseline}" "${operator_image_current}"; then
                cleanup_status=1
              fi
            fi
          fi
          exit "${cleanup_status}"

      - name: Initialize empty trading state fixtures
        run: python tools/init_empty_state.py

      - name: Verify unprivileged runtime image
        run: |
          docker run --rm --entrypoint python "${{ steps.reviewed-image.outputs.image_id }}" -c '
          import os, shutil, subprocess
          assert os.geteuid() == 1000
          assert shutil.which("sudo") is None
          assert "sudo" not in subprocess.check_output(["id", "-Gn"], text=True).split()
          '
          docker run --rm --entrypoint sh "${{ steps.reviewed-image.outputs.image_id }}" -c '
          set -eu
          touch /tmp/chown-probe
          if chown 0:0 /tmp/chown-probe 2>/dev/null; then exit 1; fi
          '

      - name: Verify missing secrets fail closed
        shell: bash
        run: |
          set -euo pipefail
          set +e
          output="$(docker run --rm "${{ steps.reviewed-image.outputs.image_id }}" --version 2>&1)"
          status=$?
          set -e
          test "${status}" -eq 78
          test "${output}" = "fatal: FT_API_PASSWORD_FILE is required"

      - name: Smoke secret entrypoint and service configs
        run: |
          python tools/compose_runtime.py ci-probe-version freqtrade
          python tools/compose_runtime.py ci-probe-version freqtrade-futures
          python tools/compose_runtime.py ci-probe-version freqtrade-research

      - name: Verify state write and input read-only mounts
        run: |
          python tools/compose_runtime.py ci-probe-mounts freqtrade
          python tools/compose_runtime.py ci-probe-mounts freqtrade-futures
          python tools/compose_runtime.py ci-probe-mounts freqtrade-research

      - name: Verify empty state through Freqtrade
        shell: bash
        run: |
          set -euo pipefail
          spot_state="$(python tools/compose_runtime.py check-state freqtrade)"
          test "${spot_state}" = "[]"
          futures_state="$(python tools/compose_runtime.py check-state freqtrade-futures)"
          test "${futures_state}" = "[]"

      - name: Verify formal dynamic-UID startup
        run: python tools/formal_startup.py verify-all --image freqtrade-cn:local

      - name: Scan current committed trees for secrets
        shell: bash
        run: |
          set -euo pipefail
          scan_root="${RUNNER_TEMP}/current-trees"
          audit_root="${RUNNER_TEMP}/gitleaks-audit"
          export scan_root
          export checkout_root="${GITHUB_WORKSPACE}"
          mkdir -p "${scan_root}" "${audit_root}"
          git archive HEAD | tar -x -C "${scan_root}"
          git submodule foreach --recursive '
            relative_path="$(realpath --relative-to="${checkout_root}" "${PWD}")"
            destination="${scan_root}/${relative_path}"
            mkdir -p "${destination}"
            git archive HEAD | tar -x -C "${destination}"
          '
          mv "${scan_root}/.gitleaksignore" "${audit_root}/expected-ignore"
          : > "${audit_root}/empty-ignore"
          set +e
          docker run --rm \
            -v "${scan_root}:/repo:ro" \
            -v "${audit_root}:/audit" \
            --workdir /repo \
            ghcr.io/gitleaks/gitleaks:v8.27.2@sha256:ebfeb6fd4f2c37fa371d3731ebfa662fdf80f93cd37d3b4771bb82263edff8d0 \
            dir . --redact --no-banner \
            --gitleaks-ignore-path /audit/empty-ignore \
            --report-format json --report-path /audit/findings.json
          unfiltered_status=$?
          set -e
          test "${unfiltered_status}" -eq 1
          python tools/gitleaks_fingerprint_audit.py \
            "${audit_root}/findings.json" "${audit_root}/expected-ignore"
          mv "${audit_root}/expected-ignore" "${scan_root}/.gitleaksignore"
          set +e
          docker run --rm \
            -v "${scan_root}:/repo:ro" \
            --workdir /repo \
            ghcr.io/gitleaks/gitleaks:v8.27.2@sha256:ebfeb6fd4f2c37fa371d3731ebfa662fdf80f93cd37d3b4771bb82263edff8d0 \
            dir . --redact --no-banner \
            --gitleaks-ignore-path /repo/.gitleaksignore
          filtered_status=$?
          set -e
          test "${filtered_status}" -eq 0
          mutation_path="${scan_root}/.ci-gitleaks-mutation"
          printf 'api_key = "%s"\n' "$(head -c 48 /dev/urandom | base64 | tr -d '\n')" > "${mutation_path}"
          set +e
          docker run --rm \
            -v "${scan_root}:/repo:ro" \
            --workdir /repo \
            ghcr.io/gitleaks/gitleaks:v8.27.2@sha256:ebfeb6fd4f2c37fa371d3731ebfa662fdf80f93cd37d3b4771bb82263edff8d0 \
            dir . --redact --no-banner \
            --gitleaks-ignore-path /repo/.gitleaksignore
          mutation_status=$?
          set -e
          rm -f "${mutation_path}"
          test "${mutation_status}" -eq 1
